{{- /*
  DB credentials Secret. Rendered only when you are NOT supplying your own
  Secret out-of-band. Set global.existingDbSecret to the name of a
  pre-created Secret (with key "db-password") to keep the real password out
  of values.yaml / git entirely.
*/ -}}
{{- if not .Values.global.existingDbSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: cloudmart-db
  labels:
    app.kubernetes.io/part-of: cloudmart
type: Opaque
stringData:
  db-password: {{ .Values.global.dbPassword | quote }}
{{- end }}
