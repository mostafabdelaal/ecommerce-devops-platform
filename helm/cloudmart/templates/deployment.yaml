{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app: {{ $name }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      containers:
      - name: {{ $name }}
        image: "{{ $svc.image.repository }}:{{ $svc.image.tag }}"
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: {{ $svc.port }}
        {{- if $svc.db }}
        env:
        - name: DB_HOST
          value: "{{ $name }}-db"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ $.Values.global.existingDbSecret | default "cloudmart-db" }}
              key: db-password
        - name: DB_NAME
          value: "{{ $name }}"
        - name: DB_PORT
          value: "5432"
        {{- end }}
---
{{- if $svc.db }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}-db
  labels:
    app: {{ $name }}-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $name }}-db
  template:
    metadata:
      labels:
        app: {{ $name }}-db
    spec:
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ $.Values.global.existingDbSecret | default "cloudmart-db" }}
              key: db-password
        - name: POSTGRES_DB
          value: "{{ $name }}"
        - name: PGDATA
          value: "/var/lib/postgresql/data/pgdata"
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/postgresql/data
        - name: db-init
          mountPath: /docker-entrypoint-initdb.d/init.sql
          subPath: {{ $name }}.sql
      volumes:
      - name: db-data
        persistentVolumeClaim:
          claimName: {{ $name }}-db-pvc
      - name: db-init
        configMap:
          name: db-init-scripts
{{- end }}
{{- end }}
---
{{- end }}
