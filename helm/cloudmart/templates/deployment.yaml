{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app: {{ $name }}
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      containers:
      - name: {{ $name }}
        image: "{{ $svc.image.repository }}:{{ $svc.image.tag }}"
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: {{ $svc.port }}
        {{- if $svc.db }}
        env:
        - name: DATABASE_URL
          value: "postgresql://postgres:{{ $.Values.global.dbPassword }}@{{ $name }}-db:5432/{{ $name }}"
        {{- end }}
---
{{- if $svc.db }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}-db
  labels:
    app: {{ $name }}-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $name }}-db
  template:
    metadata:
      labels:
        app: {{ $name }}-db
    spec:
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_PASSWORD
          value: "{{ $.Values.global.dbPassword }}"
        - name: POSTGRES_DB
          value: "{{ $name }}"
        - name: PGDATA
          value: "/var/lib/postgresql/data/pgdata"
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: db-data
        persistentVolumeClaim:
          claimName: {{ $name }}-db-pvc
{{- end }}
{{- end }}
---
{{- end }}
