{{- range $name, $svc := .Values.services }}
{{- if and $svc.enabled $svc.ingress }}
{{- if $svc.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}-ingress
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    {{- if $.Values.global.acmCertificateArn }}
    alb.ingress.kubernetes.io/certificate-arn: {{ $.Values.global.acmCertificateArn }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    {{- end }}
spec:
  ingressClassName: alb
  rules:
    - host: {{ $.Values.global.domain }}
      http:
        paths:
          - path: {{ $svc.ingress.path }}
            pathType: {{ $svc.ingress.pathType }}
            backend:
              service:
                name: {{ $name }}
                port:
                  number: {{ $svc.port }}
{{- end }}
{{- end }}
{{- end }}
