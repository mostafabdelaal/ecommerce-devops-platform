{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
spec:
  type: {{ $svc.type }}
  ports:
  - port: {{ $svc.port }}
    targetPort: {{ $svc.port }}
  selector:
    app: {{ $name }}
---
{{- if $svc.db }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-db
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: {{ $name }}-db
{{- end }}
{{- end }}
---
{{- end }}
