# Default values for cloudmart.

global:
  domain: cloudmart.example.com
  dbPassword: defaultpassword

services:
  frontend:
    enabled: true
    image:
      repository: 500345929632.dkr.ecr.eu-central-1.amazonaws.com/cloudmart-frontend
      tag: latest
    port: 80
    replicas: 2
    type: ClusterIP
    ingress:
      enabled: true
      path: /
      pathType: Prefix

  product-service:
    enabled: true
    image:
      repository: 500345929632.dkr.ecr.eu-central-1.amazonaws.com/cloudmart-product-service
      tag: latest
    port: 3000
    replicas: 2
    type: ClusterIP
    db:
      enabled: true
      storage: 1Gi

  user-service:
    enabled: true
    image:
      repository: 500345929632.dkr.ecr.eu-central-1.amazonaws.com/cloudmart-user-service
      tag: latest
    port: 3001
    replicas: 2
    type: ClusterIP
    db:
      enabled: true
      storage: 1Gi

  order-service:
    enabled: true
    image:
      repository: 500345929632.dkr.ecr.eu-central-1.amazonaws.com/cloudmart-order-service
      tag: latest
    port: 3002
    replicas: 2
    type: ClusterIP
    db:
      enabled: true
      storage: 1Gi
