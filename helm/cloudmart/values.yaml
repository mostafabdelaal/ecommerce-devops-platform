# Default values for cloudmart.

global:
  # Domain-less deploy: no custom host, no ACM cert. Ingress serves plain HTTP
  # on the ALB's own *.elb.amazonaws.com DNS name.
  domain: ""
  acmCertificateArn: ""
  # DB password. For real deploys DO NOT keep the secret here — create a
  # Secret named per existingDbSecret with key "db-password", e.g.:
  #   kubectl create secret generic cloudmart-db --from-literal=db-password=...
  # then set existingDbSecret: cloudmart-db and leave dbPassword blank.
  # The value below is a dev-only default used when existingDbSecret is empty.
  dbPassword: defaultpassword
  existingDbSecret: ""

services:
  frontend:
    enabled: true
    image:
      repository: 004595030618.dkr.ecr.eu-central-1.amazonaws.com/cloudmart-frontend
      tag: v1
    port: 80
    replicas: 2
    type: ClusterIP
    ingress:
      enabled: true
      path: /
      pathType: Prefix

  product-service:
    enabled: true
    image:
      repository: 004595030618.dkr.ecr.eu-central-1.amazonaws.com/cloudmart-product-service
      tag: v1
    port: 3000
    replicas: 2
    type: ClusterIP
    db:
      enabled: true
      storage: 1Gi

  user-service:
    enabled: true
    image:
      repository: 004595030618.dkr.ecr.eu-central-1.amazonaws.com/cloudmart-user-service
      tag: v1
    port: 3001
    replicas: 2
    type: ClusterIP
    db:
      enabled: true
      storage: 1Gi

  order-service:
    enabled: true
    image:
      repository: 004595030618.dkr.ecr.eu-central-1.amazonaws.com/cloudmart-order-service
      tag: v1
    port: 3002
    replicas: 2
    type: ClusterIP
    db:
      enabled: true
      storage: 1Gi
