name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'services/**'
      - 'frontend/**'
      - '.github/workflows/**'

env:
  AWS_REGION: eu-central-1
  ECR_REGISTRY: 500345929632.dkr.ecr.eu-central-1.amazonaws.com
  OIDC_ROLE_ARN: arn:aws:iam::500345929632:role/github-actions-ecr-role

permissions:
  id-token: write # Required for OIDC authentication
  contents: write # Required for committing Helm chart updates

jobs:
  build-and-push:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component:
          - name: frontend
            path: ./frontend
            image_name: cloudmart-frontend
          - name: product-service
            path: ./services/product-service
            image_name: cloudmart-product-service
          - name: user-service
            path: ./services/user-service
            image_name: cloudmart-user-service
          - name: order-service
            path: ./services/order-service
            image_name: cloudmart-order-service
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component.path }}
          push: false
          tags: ${{ env.ECR_REGISTRY }}/${{ matrix.component.image_name }}:${{ github.sha }}
          load: true # Load into local Docker daemon for Trivy scanning

      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ matrix.component.image_name }}:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker Image to ECR
        if: success()
        run: docker push ${{ env.ECR_REGISTRY }}/${{ matrix.component.image_name }}:${{ github.sha }}

  update-gitops:
    name: Update Helm Manifests
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update Image Tags in values.yaml
        run: |
          # Replace 'tag: latest' or any existing tag with the new commit SHA
          # We only match tags under the services section where images are defined
          sed -i -E "s/tag: .+/tag: ${{ github.sha }}/g" helm/cloudmart/values.yaml

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/cloudmart/values.yaml
          git commit -m "chore(gitops): update image tags to ${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git push
