name: CI

# Fast feedback on every push and pull request: lint, test, and prove the
# container image and compose file still build/parse.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & test backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # A real Postgres for the DB-backed tests, mirroring docker-compose.yml.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cloudmart
          POSTGRES_PASSWORD: cloudmart
          POSTGRES_DB: cloudmart
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cloudmart -d cloudmart"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: cloudmart
      DB_PASSWORD: cloudmart
      DB_NAME: cloudmart

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Load database schema
        run: psql "postgresql://cloudmart:cloudmart@localhost:5432/cloudmart" -f ../db/init.sql

      - name: Test
        run: npm test

  build:
    name: Validate Docker build & compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: cloudmart-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate docker-compose.yml
        run: docker compose config --quiet
