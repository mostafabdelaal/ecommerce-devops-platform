apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudmart-monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mostafabdelaal/ecommerce-devops-platform.git
    path: k8s/monitoring
    targetRevision: deploy-eks
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
