apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudmart
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mostafabdelaal/ecommerce-devops-platform.git
    path: helm/cloudmart
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
