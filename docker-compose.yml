# -----------------------------------------------------------------------------
# CloudMart local orchestration: Microservices + PostgreSQL databases.
# -----------------------------------------------------------------------------

services:
  # --- Product Service ---
  product-db:
    image: postgres:16-alpine
    container_name: cloudmart-product-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cloudmart
      POSTGRES_PASSWORD: cloudmart
      POSTGRES_DB: productdb
    ports:
      - "5432:5432"
    volumes:
      - product-pgdata:/var/lib/postgresql/data
      - ./services/product-service/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudmart -d productdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  product-service:
    build:
      context: ./services/product-service
    container_name: cloudmart-product-service
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: product-db
      DB_PORT: 5432
      DB_USER: cloudmart
      DB_PASSWORD: cloudmart
      DB_NAME: productdb
      DB_CONNECT_RETRIES: 5
      DB_CONNECT_RETRY_DELAY_MS: 3000
    ports:
      - "3000:3000"
    depends_on:
      product-db:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # --- User Service ---
  user-db:
    image: postgres:16-alpine
    container_name: cloudmart-user-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cloudmart
      POSTGRES_PASSWORD: cloudmart
      POSTGRES_DB: userdb
    ports:
      - "5433:5432"
    volumes:
      - user-pgdata:/var/lib/postgresql/data
      - ./services/user-service/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudmart -d userdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  user-service:
    build:
      context: ./services/user-service
    container_name: cloudmart-user-service
    restart: unless-stopped
    environment:
      PORT: 3001
      DB_HOST: user-db
      DB_PORT: 5432
      DB_USER: cloudmart
      DB_PASSWORD: cloudmart
      DB_NAME: userdb
      DB_CONNECT_RETRIES: 5
      DB_CONNECT_RETRY_DELAY_MS: 3000
    ports:
      - "3001:3001"
    depends_on:
      user-db:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://127.0.0.1:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # --- Order Service ---
  order-db:
    image: postgres:16-alpine
    container_name: cloudmart-order-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cloudmart
      POSTGRES_PASSWORD: cloudmart
      POSTGRES_DB: orderdb
    ports:
      - "5434:5432"
    volumes:
      - order-pgdata:/var/lib/postgresql/data
      - ./services/order-service/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudmart -d orderdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  order-service:
    build:
      context: ./services/order-service
    container_name: cloudmart-order-service
    restart: unless-stopped
    environment:
      PORT: 3002
      DB_HOST: order-db
      DB_PORT: 5432
      DB_USER: cloudmart
      DB_PASSWORD: cloudmart
      DB_NAME: orderdb
      DB_CONNECT_RETRIES: 5
      DB_CONNECT_RETRY_DELAY_MS: 3000
    ports:
      - "3002:3002"
    depends_on:
      order-db:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://127.0.0.1:3002/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # --- Frontend Service ---
  frontend:
    build:
      context: ./frontend
    container_name: cloudmart-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      product-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      order-service:
        condition: service_healthy

volumes:
  product-pgdata:
  user-pgdata:
  order-pgdata:
